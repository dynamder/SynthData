[llm]
# LLM API Key (required)
# Get from your LLM provider (OpenAI, Azure, SiliconFlow, etc.)
# Can also set via environment variable: OPENAI_API_KEY
api_key = "your-api-key-here"

# Base URL for the LLM API (required)
# Examples:
#   - OpenAI: "https://api.openai.com/v1"
#   - SiliconFlow: "https://api.siliconflow.cn/v1"
#   - Azure OpenAI: "https://your-resource.openai.azure.com/"
base_url = "https://api.openai.com/v1"

# Model name to use (required)
# Examples:
#   - "gpt-4o-mini"
#   - "Pro/deepseek-ai/DeepSeek-V3.1-Terminus"
#   - "deepseek-chat"
model = "gpt-4o-mini"

# Maximum retry attempts for failed LLM calls
max_retries = 3
